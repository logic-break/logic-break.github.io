<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="MobileOptimized" content="640" />
	<meta name="HandheldFriendly" content="true" />
	<title>LBHL - Logic-Break Half Life</title>
	<script>
		document.addEventListener('contextmenu', event => event.preventDefault());
		window.onbeforeunload = function(e) {
			e.preventDefault();
			e.returnValue = 'Really want to quit the game?';
		};

		document.onkeydown = function(e) {
			e = e || window.event;
			if (!e.ctrlKey) return;
			var code = e.which || e.keyCode;
			switch (code) {
				case 83:
				case 87:
					e.preventDefault();
					e.stopPropagation();
					break;
			}
		};
		var a = new Audio('music.mp3');
		var pashalka_count = 0;

		function play_sound() {
			if (pashalka_count == 40) a.play();
			if (pashalka_count < 100) pashalka_count += 1;
		}
		window.addEventListener('click', play_sound);
		window.addEventListener('keydown', play_sound);
	</script>
	<style>
		:root {
			--primary: #f0b418;
			--primary-dark: #ffa600;
			--bg: #1a1a1a;
			--bg-light: #2d2d2d;
			--bg-lighter: #3d3d3d;
			--text: #f0f0f0;
			--text-muted: #aaa;
			--border: #444;
			--border-light: #555;
			--shadow: rgba(0, 0, 0, 0.3);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
			outline: none;
			cursor: default;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
			background-color: var(--bg);
			color: var(--text);
			line-height: 1.6;
			padding: 20px;
			min-height: 100vh;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
		}

		.header {
			text-align: center;
			margin-bottom: 30px;
			padding-bottom: 20px;
			border-bottom: 1px solid var(--border);
		}

		.game-title {
			font-size: 2.5rem;
			color: var(--primary);
			margin-bottom: 10px;
			letter-spacing: 1px;
		}

		.game-subtitle {
			font-size: 1.2rem;
			color: var(--text-muted);
			margin-bottom: 15px;
		}

		.status-bar {
			background: var(--bg-light);
			border-radius: 8px;
			padding: 15px;
			margin-bottom: 20px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border: 1px solid var(--border);
		}

		#status {
			font-weight: 500;
			color: var(--primary);
		}

		.progress-container {
			flex: 1;
			max-width: 300px;
			background: var(--bg-lighter);
			border-radius: 10px;
			overflow: hidden;
			height: 20px;
			margin: 0 20px;
			display: none;
		}

		#progress {
			height: 100%;
			background: linear-gradient(90deg, var(--primary), var(--primary-dark));
			width: 0%;
			transition: width 0.3s ease;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 12px;
			color: #000;
			font-weight: bold;
		}

		.loader {
			width: 24px;
			height: 24px;
			border: 3px solid var(--bg-lighter);
			border-top: 3px solid var(--primary);
			border-radius: 50%;
			animation: spin 1s linear infinite;
			margin: 0 auto;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		.canvas-container {
			text-align: center;
			margin: 20px 0;
		}

		canvas.emscripten {
			border: none;
			background-image: url(xd.png);
			box-shadow: 0 0 20px rgba(240, 180, 24, 0.3);
			border-radius: 4px;
			max-width: 100%;
			height: auto;
		}

		.controls-panel {
			background: var(--bg-light);
			border-radius: 8px;
			padding: 20px;
			margin: 20px 0;
			border: 1px solid var(--border);
		}

		.controls-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			padding-bottom: 15px;
			border-bottom: 1px solid var(--border-light);
		}

		.controls-title {
			font-size: 1.5rem;
			color: var(--primary);
			font-weight: 600;
		}

		.controls-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 20px;
			margin-bottom: 20px;
		}

		.control-group {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 12px;
			background: var(--bg-lighter);
			border-radius: 6px;
			border: 1px solid var(--border);
		}

		.control-group label {
			flex: 1;
			color: var(--text);
			font-size: 0.95rem;
		}

		input[type="checkbox"] {
			width: 18px;
			height: 18px;
			accent-color: var(--primary);
			cursor: pointer;
		}

		.btn {
			background: linear-gradient(135deg, var(--primary), var(--primary-dark));
			color: #000;
			border: none;
			padding: 12px 24px;
			border-radius: 6px;
			font-weight: 600;
			font-size: 1rem;
			cursor: pointer;
			transition: all 0.2s ease;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
		}

		.btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 5px 15px var(--shadow);
		}

		.btn:active {
			transform: translateY(0);
		}

		.btn-fullscreen {
			background: linear-gradient(135deg, #444, #666);
			color: var(--text);
		}

		.options-panel {
			background: var(--bg-light);
			border-radius: 8px;
			padding: 25px;
			margin-top: 20px;
			border: 1px solid var(--border);
		}

		.section-title {
			font-size: 1.3rem;
			color: var(--primary);
			margin-bottom: 20px;
			padding-bottom: 10px;
			border-bottom: 1px solid var(--border-light);
		}

		.option-row {
			margin-bottom: 20px;
		}

		.option-label {
			display: block;
			margin-bottom: 8px;
			color: var(--text);
			font-weight: 500;
		}

		.radio-group {
			display: flex;
			flex-direction: column;
			gap: 10px;
			margin-top: 10px;
		}

		.radio-option {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px;
			background: var(--bg-lighter);
			border-radius: 6px;
			border: 1px solid transparent;
			transition: all 0.2s ease;
		}

		.radio-option:hover {
			border-color: var(--primary);
			background: var(--bg);
		}

		input[type="radio"] {
			width: 16px;
			height: 16px;
			accent-color: var(--primary);
			cursor: pointer;
		}

		input[type="text"], input[type="number"] {
			width: 100%;
			padding: 12px;
			background: var(--bg-lighter);
			border: 1px solid var(--border);
			border-radius: 6px;
			color: var(--text);
			font-size: 1rem;
			transition: border-color 0.2s ease;
		}

		input[type="text"]:focus, input[type="number"]:focus {
			border-color: var(--primary);
		}

		.file-upload {
			position: relative;
			display: inline-block;
		}

		.file-upload-label {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 10px 20px;
			background: var(--bg-lighter);
			border: 2px dashed var(--border);
			border-radius: 6px;
			color: var(--text-muted);
			cursor: pointer;
			transition: all 0.2s ease;
		}

		.file-upload-label:hover {
			border-color: var(--primary);
			color: var(--text);
		}

		.file-upload input[type="file"] {
			display: none;
		}

		.console-container {
			margin-top: 20px;
		}

		#output {
			width: 100%;
			height: 200px;
			background: #000;
			color: #00ff00;
			font-family: 'Consolas', 'Monaco', monospace;
			padding: 15px;
			border: 1px solid var(--primary);
			border-radius: 6px;
			resize: vertical;
			font-size: 0.9rem;
			line-height: 1.4;
			display: none;
		}

		.divider {
			height: 1px;
			background: var(--border);
			margin: 25px 0;
		}

		.links-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			gap: 10px;
			margin-top: 15px;
		}

		.link-item {
			padding: 10px;
			background: var(--bg-lighter);
			border-radius: 6px;
			border: 1px solid var(--border);
			color: var(--primary);
			text-decoration: none;
			text-align: center;
			transition: all 0.2s ease;
		}

		.link-item:hover {
			background: var(--bg);
			border-color: var(--primary);
			transform: translateY(-2px);
		}

		@media (max-width: 768px) {
			body {
				padding: 10px;
			}
			
			.controls-grid {
				grid-template-columns: 1fr;
			}
			
			.status-bar {
				flex-direction: column;
				gap: 15px;
			}
			
			.progress-container {
				max-width: 100%;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="header">
			<h1 class="game-title">LBHL</h1>
			<div class="game-subtitle">Logic-Break Half Life</div>
			<div class="status-bar">
				<div id="status">Downloading...</div>
				<div class="progress-container" id="progress1">
					<div id="progress"></div>
				</div>
				<div class="loader" id="loader1"></div>
			</div>
		</div>

		<div class="canvas-container">
			<canvas style="display:none" class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
		</div>

		<div class="controls-panel">
			<div class="controls-header">
				<div class="controls-title">Game Controls</div>
				<div class="controls-grid">
					<div class="control-group">
						<input type="checkbox" id="show_console_log">
						<label for="show_console_log">Show Console Log</label>
					</div>
					<div class="control-group">
						<input type="checkbox" id="resize">
						<label for="resize">Resize canvas</label>
					</div>
					<div class="control-group">
						<input type="checkbox" id="pointerLock" checked>
						<label for="pointerLock">Lock/hide mouse pointer</label>
					</div>
				</div>
				<button class="btn btn-fullscreen" onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked, document.getElementById('resize').checked)">
					Fullscreen
				</button>
			</div>
		</div>

		<div id="asyncDialog" style="display: none;"></div>

		<div class="console-container">
			<textarea id="output" rows="8" style="display: none;"></textarea>
		</div>

		<div class="options-panel">
			<div class="section-title" id="optionsTitle">Game Options</div>
			<form id="fSettings" style="display:none">
				
				<div class="option-row">
					<div class="option-label">Select filesystem for settings and save/restore:</div>
					<div class="radio-group">
						<div id="idbHider" style="display:none">
							<label class="radio-option">
								<input type="radio" name="a" id="rIndexedDB" checked />
								<span>IndexedDB (Need exit correctly to save changes)</span>
							</label>
						</div>
						<label class="radio-option">
							<input type="radio" name="a" id="rLocalStorage" />
							<span>LocalStorage (Sometimes not enough space)</span>
						</label>
						<label class="radio-option">
							<input type="radio" name="a" id="rNone" />
							<span>None (in RAM)</span>
						</label>
					</div>
				</div>

				<div class="divider"></div>

				<div class="option-row">
					<div class="option-label">Select game data source:</div>
					<div class="radio-group">
						<div id="pkgHider" style="display:none">
							<label class="radio-option">
								<input type="radio" name="b" id="rPackage" />
								<span>Emscripten package from server (cached in IndexedDB if available)</span>
							</label>
							<select id="selectPkg" style="display:none; margin-top: 10px;"></select>
						</div>
						<div id="zipHider" style="display:none">
							<label class="radio-option">
								<input type="radio" name="b" id="rZip" checked />
								<span>ZIP archive from server (slow, but small, no IndexedDB cache)</span>
							</label>
							<select id="selectZip" style="display:none; margin-top: 10px;"></select>
						</div>
						<label class="radio-option">
							<input type="radio" name="b" id="rLocalZip" />
							<span>Local ZIP file:</span>
						</label>
						<div class="file-upload" style="margin-top: 10px;">
							<label class="file-upload-label" id="label_file_select">
								Select ZIP file
								<input type="file" id="iZipFile" />
							</label>
						</div>
					</div>
				</div>

				<div class="divider"></div>

				<div class="option-row">
					<label class="option-label">Command-line arguments:</label>
					<input type="text" id="iArgs" value="-dev 1 -game valve" />
				</div>

				<div style="text-align: center; margin-top: 30px;">
					<button class="btn" onclick="startXash();return false;" style="padding: 15px 40px; font-size: 1.1rem;">
						Launch LBHL
					</button>
				</div>

				<div class="divider"></div>

				<div id="linksPlaceholder" style="display:none; margin-top: 20px;">
					<div class="option-label">Download archives to load locally next time:</div>
					<div class="links-grid"></div>
				</div>
			</form>
		</div>
	</div>

	<script type='text/javascript' src='browserfs.min.js'></script>
	<script type='text/javascript'>
		var zipMods = [];
		var pkgMods = [];
	</script>
	<script type='text/javascript' src='mods.js'></script>
	
	<!-- Остальной JavaScript код остается без изменений -->
	<script type='text/javascript'>
		var show_again = true;
		var statusElement = document.getElementById('status');
		var progressElement = document.getElementById('progress');
		var asyncDialog = document.getElementById('asyncDialog');
		var myerrorbuf = ''
		var myerrordate = new Date();
		var mounted = false;
		var gamedir = 'valve';
		var moduleCount = 0;

		if (!ArrayBuffer['isView']) {
			ArrayBuffer.isView = function(a) {
				return a !== null && typeof(a) === "object" && a['buffer'] instanceof ArrayBuffer;
			};
		}

		document.getElementById('optionsTitle').style.display = 'none';

		function prepareSelects() {
			var len = zipMods.length;
			var select = document.getElementById('selectZip');
			if (len) {
				document.getElementById('zipHider').style.display = 'block';
				if (len > 1) {
					var links = '';
					for (var i = 0; i < len; i++) {
						select.options[i] = new Option(zipMods[i][1], zipMods[i][0]);
						links += '<a class="link-item" href="' + zipMods[i][0] + '">' + zipMods[i][1] + '</a>';
					}
					select.style.display = 'block';
					document.querySelector('#linksPlaceholder .links-grid').innerHTML = links;
				}
			} else {
				document.getElementById('rZip').checked = false;
			}
			
			len = pkgMods.length;
			select = document.getElementById('selectPkg');
			if (len) {
				document.getElementById('pkgHider').style.display = 'block';
				if (len > 1) {
					for (var i = 0; i < len; i++) {
						select.options[i] = new Option(pkgMods[i][1], pkgMods[i][0]);
					}
				}
			} else {
				document.getElementById('rPackage').checked = false;
			}

			if (!zipMods.length && !len) {
				document.getElementById('rLocalZip').checked = true;
				document.getElementById('rLocalZip').parentElement.style.display = 'flex';
			}
		}

		try {
			mem = Math.round(window.location.hash.substring(1));
		} catch (e) {};

		var Module = {
			TOTAL_MEMORY: mem * 1024 * 1024,
			preRun: [],
			postRun: [],
			print: (function() {
				var element = document.getElementById('output');
				if (element) element.value = '';
				return function(text) {
					if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
					if (text) {
						myerrorbuf += text + '\n';
						console.log(text);
						if (text == "exit(0)") {
							document.getElementById('canvas').style.display = "none";
							setTimeout(function(){
								location.reload();
							}, 1000);
						} else if (text == "shader success") {
							pashalka_count = 100;
							a.pause();
							document.getElementById('canvas').style.display = "block";
						}
					}
					if (element) {
						if (element.value.length > 65536) {
							element.value = element.value.substring(512) + myerrorbuf;
						} else {
							element.value += myerrorbuf;
						}
						element.scrollTop = element.scrollHeight;
					}
					myerrorbuf = '';
				};
			})(),
			printErr: function(text) {
				if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
				if (myerrorbuf.length > 2048) {
					myerrorbuf = 'some lines skipped\n' + myerrorbuf.substring(512);
				}
				myerrorbuf += text + '\n';
				if (new Date() - myerrordate > 3000) {
					myerrordate = new Date();
					Module.print();
				}
			},
			canvas: (function() {
				var canvas = document.getElementById('canvas');
				canvas.addEventListener("webglcontextlost", function(e) {
					alert('WebGL context lost. You will need to reload the page.');
					e.preventDefault();
				}, false);
				return canvas;
			})(),
			setStatus: function(text) {
				if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
				if (text === Module.setStatus.text) return;
				if (new Date() - myerrordate > 3000) {
					myerrordate = new Date();
					Module.print();
				}
				statusElement.innerHTML = text;
				if (progressElement) {
					var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
					if (m) {
						var progress = Math.round(parseInt(m[2]) * 100 / parseInt(m[4]));
						progressElement.style.width = progressElement.innerHTML = '' + progress + '%';
						document.getElementById('progress1').style.display = 'block';
					} else {
						document.getElementById('progress1').style.display = 'none';
					}
				}
			},
			totalDependencies: 0,
			monitorRunDependencies: function(left) {
				this.totalDependencies = Math.max(this.totalDependencies, left);
				if (left) {
					Module.setStatus('Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')');
				}
			}
		};

		window.onerror = function(event) {
			if (mounted) {
				FS.syncfs(false, function(err) {
					Module.print('Saving IDBFS: ' + err);
				});
			}
			if (('' + event).indexOf('SimulateInfiniteLoop') > 0) return;
			var text = 'Exception thrown: ' + event;
			Module.setStatus(text);
			Module.print('Exception thrown: ' + event);
		};

		function haltRun() {}

		var savedRun;

		function radioChecked(id) {
			var r = document.getElementById('r' + id);
			if (r) return r.checked;
			return false;
		}

		Module.setStatus('Downloading...');

		function startXash() {
			document.getElementById('loader1').style.display = 'none';
			document.getElementById('optionsTitle').style.display = 'none';
			document.getElementById('fSettings').style.display = 'none';
			setupFS();
			Module.arguments = document.getElementById('iArgs').value.split(' ');
			Module.run = run = savedRun;
			
			if (radioChecked('Zip')) {
				const zipper = document.getElementById('selectZip');
				if (zipMods.length > 1) {
					var mod_parts = [zipMods[0][3], zipMods[0][4], zipMods[0][2]];
					for (var i = 0; i < zipMods.length; i++) {
						if (zipMods[i][0] == zipper.value) {
							mod_parts = [zipMods[i][3], zipMods[i][4], zipMods[i][2]];
							break;
						}
					}
					fetchZIP(zipper.value, savedRun, mod_parts[0], mod_parts[1], mod_parts[2]);
				} else {
					fetchZIP(zipMods[0][0], savedRun, zipMods[0][3]);
				}
			} else if ((!zipMods.length && !pkgMods.length) || radioChecked('LocalZip')) {
				var reader = new FileReader();
				reader.onload = function() {
					mountZIP(reader.result);
					Module.print("Loaded zip data");
					savedRun();
				};
				reader.readAsArrayBuffer(document.getElementById('iZipFile').files[0]);
			} else if (radioChecked('Package')) {
				var script = document.createElement('script');
				script.onload = savedRun;
				document.body.appendChild(script);
				script.src = pkgMods.length > 1 ? document.getElementById('selectPkg').value : pkgMods[0][0];
			}

			window.addEventListener("beforeunload", function(e) {
				var confirmationMessage = 'Leave the game?';
				(e || window.event).returnValue = confirmationMessage;
				return confirmationMessage;
			});
		}

		function mountZIP(data) {
			var Buffer = BrowserFS.BFSRequire('buffer').Buffer;
			mfs.mount('/zip', new BrowserFS.FileSystem.ZipFS(Buffer.from(data)));
			FS.mount(new BrowserFS.EmscriptenFS(), { root: '/zip' }, '/rodir');
		}

		function fetchZIP(packageName, cb, parts = 0, size_of_parts = 0, total_size = 0) {
			if (parts == 0) {
				var xhr = new XMLHttpRequest();
				xhr.open('GET', packageName, true);
				xhr.responseType = 'arraybuffer';
				xhr.onprogress = function(event) {
					var url = packageName;
					var size;
					if (event.total) size = event.total;
					else size = zipMods[document.getElementById('selectZip').selectedIndex][2];
					if (event.loaded) {
						var total = size;
						var loaded = event.loaded;
						if (Module['setStatus']) Module['setStatus']('Downloading data... (' + loaded + '/' + total + ')');
					} else if (!Module.dataFileDownloads) {
						if (Module['setStatus']) Module['setStatus']('Downloading data...');
					}
				};
				xhr.onerror = function(event) { throw new Error("NetworkError"); }
				xhr.onload = function(event) {
					if (xhr.status == 200 || xhr.status == 304 || xhr.status == 206 || (xhr.status == 0 && xhr.response)) {
						mountZIP(xhr.response);
						cb();
					} else {
						throw new Error(xhr.statusText + " : " + xhr.responseURL);
					}
				};
				xhr.send(null);
			} else {
				var buffers = new Uint8Array(total_size);
				var finished = 0;
				for (var i = 0; i < parts; i++) {
					const cur = i;
					const no_ext = packageName.slice(0, -4);
					const url1 = no_ext + '_out/' + no_ext + '-' + cur + '.zip';
					const xhr = new XMLHttpRequest();
					xhr.open('GET', url1, true);
					xhr.responseType = 'arraybuffer';
					xhr.onprogress = function(event) {
						if (event.loaded) {
							var loaded = event.loaded;
							if (Module['setStatus']) Module['setStatus']('Downloading data... (' + ((finished * size_of_parts) + loaded) + '/' + total_size + ')');
						}
					};
					xhr.onerror = function(event) { throw new Error("NetworkError"); }
					xhr.onload = function(event) {
						if (xhr.status == 200 || xhr.status == 304 || xhr.status == 206 || (xhr.status == 0 && xhr.response)) {
							finished++;
							buffers.set(new Uint8Array(xhr.response), cur * size_of_parts);
							if (finished == parts) {
								mountZIP(buffers);
								cb();
							}
						} else {
							throw new Error(xhr.statusText + " : " + xhr.responseURL);
						}
					};
					xhr.send(null);
				}
			}
		}

		function setupFS() {
			FS.mkdir('/rodir');
			FS.mkdir('/xash');
			try {
				mfs = new BrowserFS.FileSystem.MountableFileSystem();
				BrowserFS.initialize(mfs);
			} catch (e) {
				mfs = undefined;
				Module.print('Failed to initialize BrowserFS: ' + e);
			}

			if (radioChecked('IndexedDB')) {
				FS.mount(IDBFS, {}, '/xash');
				FS.syncfs(true, function(err) {
					if (err) Module.print('Loading IDBFS: ' + err);
				});
				mounted = true;
			}

			if (radioChecked('LocalStorage') && mfs) {
				mfs.mount('/ls', new BrowserFS.FileSystem.LocalStorage());
				FS.mount(new BrowserFS.EmscriptenFS(), { root: '/ls' }, '/xash');
				Module.print('LocalStorage mounted');
			}

			FS.chdir('/xash/');
		}

		function skipRun() {
			savedRun = run;
			Module.run = haltRun;
			run = haltRun;

			Module.setStatus("LBHL downloaded!");
			document.getElementById('loader1').style.display = 'none';
			document.getElementById('optionsTitle').style.display = 'block';

			if (window.indexedDB || window.mozIndexedDB || window.webkitIndexedDB || window.msIndexedDB) {
				document.getElementById('idbHider').style.display = 'block';
			}
			
			prepareSelects();
			document.getElementById('fSettings').style.display = 'block';

			ENV.XASH3D_GAMEDIR = gamedir;
			ENV.XASH3D_RODIR = '/rodir'

			function loadModule(name) {
				var script = document.createElement('script');
				script.onload = function() {
					moduleCount++;
					if (moduleCount == 3) {
						Module.setStatus("Scripts downloaded!");
					}
				};
				document.body.appendChild(script);
				script.src = name + ".js";
			}

			loadModule("server");
			loadModule("client");
			loadModule("menu");
		};

		Module.preInit = [skipRun];
		Module.websocket = [];
		Module.websocket.url = 'wsproxy://4.tcp.ngrok.io:10657/';
		ENV = [];
	</script>
