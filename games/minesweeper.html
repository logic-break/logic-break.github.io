<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сапер</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 900;
            font-family: 'Inter', sans-serif;
        }

        .settings {
            display: flex;
            gap: 15px;
        }

        .language-selector, .difficulty-selector {
            display: flex;
            gap: 8px;
            background: rgba(30, 41, 59, 0.5);
            padding: 5px;
            border-radius: 6px;
        }

        .lang-btn, .diff-btn {
            background: rgba(15, 23, 42, 0.8);
            color: #f8fafc;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .lang-btn:hover, .diff-btn:hover {
            background: rgba(30, 41, 59, 0.8);
        }

        .lang-btn.active, .diff-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            background: rgba(30, 41, 59, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer, .mines-counter, .lives {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Fira Code', monospace;
        }

        .mines-counter, .lives {
            color: var(--primary);
        }

        .heart {
            color: #ef4444;
            font-size: 1.2rem;
        }

        .heart.empty {
            color: #475569;
        }

        .minesweeper-board {
            display: grid;
            gap: 3px;
            background-color: rgba(30, 41, 59, 0.3);
            border: 2px solid rgba(59, 130, 246, 0.2);
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            padding: 3px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .cell {
            background: rgba(30, 41, 59, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-family: 'Fira Code', monospace;
            border-radius: 4px;
        }

        .cell:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .cell.revealed {
            background: rgba(15, 23, 42, 0.8);
            cursor: default;
        }

        .cell.revealed:hover {
            background: rgba(15, 23, 42, 0.8);
        }

        .cell.flagged::after {
            content: '🚩';
        }

        .cell.mine::after {
            content: '💣';
        }

        .cell.mine.revealed {
            background: rgba(220, 38, 38, 0.3);
            animation: pulse 0.5s;
        }

        .cell.number-1 { color: #60a5fa; }
        .cell.number-2 { color: #4ade80; }
        .cell.number-3 { color: #f87171; }
        .cell.number-4 { color: #c084fc; }
        .cell.number-5 { color: #fbbf24; }
        .cell.number-6 { color: #22d3ee; }
        .cell.number-7 { color: #d97706; }
        .cell.number-8 { color: #94a3b8; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .action-btn {
            background: rgba(30, 41, 59, 0.7);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 0;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }

        .action-btn:hover {
            background: rgba(30, 41, 59, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .action-btn.primary {
            background: linear-gradient(145deg, var(--primary), #1d4ed8);
            color: var(--bg);
            border: none;
        }

        .action-btn.primary:hover {
            background: linear-gradient(145deg, #60a5fa, var(--primary));
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .action-btn:disabled {
            background: rgba(30, 41, 59, 0.3);
            color: #64748b;
            cursor: not-allowed;
        }

        .game-status {
            margin-top: 10px;
            font-size: 1.1rem;
            height: 24px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            padding: 12px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .game-over {
            color: #ef4444;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        .game-won {
            color: #4ade80;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        @media (max-width: 500px) {
            .minesweeper-board {
                max-width: 100%;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .settings {
                flex-direction: column;
                gap: 10px;
            }
            
            .cell {
                font-size: 1rem;
            }
            
            .game-info {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container">
        <header>
            <h1 id="title">Сапер</h1>
            <div class="settings">
                <div class="language-selector">
                    <button class="lang-btn active" data-lang="ru">RU</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-diff="easy">Легко</button>
                    <button class="diff-btn" data-diff="medium">Средне</button>
                    <button class="diff-btn" data-diff="hard">Сложно</button>
                </div>
            </div>
        </header>
        
        <div class="game-info">
            <div class="timer" id="timer">00:00</div>
            <div class="mines-counter" id="mines-counter">💣: 10</div>
            <div class="lives" id="lives">
                <span class="heart">❤</span>
                <span class="heart">❤</span>
                <span class="heart">❤</span>
            </div>
        </div>
        
        <div class="minesweeper-board" id="minesweeper-board"></div>
        
        <div class="game-status" id="game-status"></div>
        
        <div class="controls">
            <div class="action-buttons">
                <button class="action-btn" id="hint-btn">Подсказка</button>
                <button class="action-btn primary" id="new-game-btn">Новая игра</button>
            </div>
        </div>
    </div>

    <script>
        // Тексты на разных языках
        const translations = {
            ru: {
                title: "Сапер",
                difficulty: "Сложность",
                easy: "Легкая",
                medium: "Средняя",
                hard: "Сложная",
                newGame: "Новая игра",
                hint: "Подсказка",
                complete: "Поздравляем! Вы победили!",
                time: "Время",
                mines: "Мины",
                lives: "Жизни",
                gameOver: "Игра окончена! Начните новую игру.",
                mistake: "Ошибка! Потеряна одна жизнь.",
                flag: "Флаг",
                removeFlag: "Убрать флаг"
            },
            en: {
                title: "Minesweeper",
                difficulty: "Difficulty",
                easy: "Easy",
                medium: "Medium",
                hard: "Hard",
                newGame: "New Game",
                hint: "Hint",
                complete: "Congratulations! You won!",
                time: "Time",
                mines: "Mines",
                lives: "Lives",
                gameOver: "Game over! Start a new game.",
                mistake: "Mistake! You lost one life.",
                flag: "Flag",
                removeFlag: "Remove flag"
            }
        };

        // Текущий язык
        let currentLanguage = 'ru';

        // Элементы DOM
        const titleElement = document.getElementById('title');
        const timerElement = document.getElementById('timer');
        const minesCounterElement = document.getElementById('mines-counter');
        const livesElement = document.getElementById('lives');
        const minesweeperBoard = document.getElementById('minesweeper-board');
        const hintBtn = document.getElementById('hint-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const gameStatus = document.getElementById('game-status');
        const langButtons = document.querySelectorAll('.lang-btn');
        const diffButtons = document.querySelectorAll('.diff-btn');

        // Состояние игры
        let board = [];
        let minePositions = [];
        let revealedCells = 0;
        let flaggedCells = 0;
        let gameTime = 0;
        let timerInterval = null;
        let lives = 3;
        let gameActive = true;
        let firstClick = true;

        // Настройки сложности
        const difficultySettings = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let currentDifficulty = 'easy';
        let rows = 9;
        let cols = 9;
        let totalMines = 10;

        // Инициализация игры
        function initGame() {
            createBoard();
            startTimer();
            updateUI();
            
            // Добавляем обработчики событий
            langButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setLanguage(btn.dataset.lang);
                });
            });
            
            diffButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setDifficulty(btn.dataset.diff);
                });
            });
            
            newGameBtn.addEventListener('click', startNewGame);
            hintBtn.addEventListener('click', giveHint);
        }

        // Создание игрового поля
        function createBoard() {
            minesweeperBoard.innerHTML = '';
            minesweeperBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            minesweeperBoard.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            
            board = [];
            for (let i = 0; i < rows; i++) {
                board[i] = [];
                for (let j = 0; j < cols; j++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    // Левый клик - открыть ячейку
                    cell.addEventListener('click', () => revealCell(i, j));
                    
                    // Правый клик - поставить/убрать флаг
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        toggleFlag(i, j);
                    });
                    
                    minesweeperBoard.appendChild(cell);
                    board[i][j] = {
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        adjacentMines: 0,
                        element: cell
                    };
                }
            }
        }

        // Размещение мин на поле
        function placeMines(excludeRow, excludeCol) {
            minePositions = [];
            let minesPlaced = 0;
            
            while (minesPlaced < totalMines) {
                const row = Math.floor(Math.random() * rows);
                const col = Math.floor(Math.random() * cols);
                
                // Не ставим мину в исключенную ячейку и вокруг нее
                if ((row === excludeRow && col === excludeCol) || 
                    (Math.abs(row - excludeRow) <= 1 && Math.abs(col - excludeCol) <= 1)) {
                    continue;
                }
                
                if (!board[row][col].isMine) {
                    board[row][col].isMine = true;
                    minePositions.push({row, col});
                    minesPlaced++;
                }
            }
            
            // Подсчитываем количество мин вокруг каждой ячейки
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (!board[i][j].isMine) {
                        board[i][j].adjacentMines = countAdjacentMines(i, j);
                    }
                }
            }
        }

        // Подсчет мин вокруг ячейки
        function countAdjacentMines(row, col) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const newRow = row + i;
                    const newCol = col + j;
                    
                    if (newRow >= 0 && newRow < rows && newCol >= 0 && newCol < cols) {
                        if (board[newRow][newCol].isMine) {
                            count++;
                        }
                    }
                }
            }
            return count;
        }

        // Функция для проверки всех флагов
        function checkAllFlags() {
            if (!gameActive) return;
            
            let flaggedCells = 0;
            let correctFlags = 0;
            
            // Считаем флаги и правильные флаги
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = board[i][j];
                    if (cell.isFlagged) {
                        flaggedCells++;
                        // Проверяем, стоит ли флаг на мине
                        if (cell.isMine) {
                            correctFlags++;
                        }
                    }
                }
            }
            
            // Если все мины помечены флагами и нет лишних флагов
            if (correctFlags === totalMines && flaggedCells === totalMines) {
                gameActive = false;
                clearInterval(timerInterval);
                gameStatus.textContent = translations[currentLanguage].complete;
                gameStatus.style.color = '#4ade80';
                gameStatus.classList.add('game-won');
                
                // Показываем все мины
                revealAllMines();
            }
        }

        // Открытие ячейки
        function revealCell(row, col) {
            if (!gameActive || board[row][col].isRevealed || board[row][col].isFlagged) {
                return;
            }
            
            // При первом клике размещаем мины
            if (firstClick) {
                placeMines(row, col);
                firstClick = false;
            }
            
            const cell = board[row][col];
            
            // Если нажали на мину
            if (cell.isMine) {
                cell.isRevealed = true;
                cell.element.classList.add('revealed', 'mine');
                loseLife();
                return;
            }
            
            // Открываем ячейку
            cell.isRevealed = true;
            cell.element.classList.add('revealed');
            revealedCells++;
            
            // Показываем количество мин вокруг
            if (cell.adjacentMines > 0) {
                cell.element.textContent = cell.adjacentMines;
                cell.element.classList.add(`number-${cell.adjacentMines}`);
            } else {
                // Если мин вокруг нет, открываем соседние ячейки рекурсивно
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        const newRow = row + i;
                        const newCol = col + j;
                        
                        if (newRow >= 0 && newRow < rows && newCol >= 0 && newCol < cols) {
                            if (!board[newRow][newCol].isRevealed && !board[newRow][newCol].isFlagged) {
                                revealCell(newRow, newCol);
                            }
                        }
                    }
                }
            }
            
            // Проверяем, выиграл ли игрок
            checkWinCondition();
            
            // Также проверяем флаги после открытия клетки
            checkAllFlags();
        }

        // Переключение флага
        function toggleFlag(row, col) {
            if (!gameActive || board[row][col].isRevealed) {
                return;
            }
            
            const cell = board[row][col];
            
            if (cell.isFlagged) {
                cell.isFlagged = false;
                cell.element.classList.remove('flagged');
                flaggedCells--;
            } else {
                cell.isFlagged = true;
                cell.element.classList.add('flagged');
                flaggedCells++;
            }
            
            updateMinesCounter();
            
            // Проверяем, все ли поле в флагах
            checkAllFlags();
        }

        // Потеря жизни
        function loseLife() {
            lives--;
            updateLivesDisplay();
            
            // Показываем сообщение об ошибке
            gameStatus.textContent = translations[currentLanguage].mistake;
            gameStatus.style.color = '#ef4444';
            
            // Если жизни закончились
            if (lives <= 0) {
                gameActive = false;
                clearInterval(timerInterval);
                gameStatus.textContent = translations[currentLanguage].gameOver;
                gameStatus.classList.add('game-over');
                
                // Показываем все мины
                revealAllMines();
            }
        }

        // Показать все мины
        function revealAllMines() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = board[i][j];
                    if (cell.isMine && !cell.isRevealed) {
                        cell.isRevealed = true;
                        cell.element.classList.add('revealed', 'mine');
                    }
                }
            }
        }

        // Проверка условия победы
        function checkWinCondition() {
            const totalCells = rows * cols;
            if (revealedCells === totalCells - totalMines) {
                gameActive = false;
                clearInterval(timerInterval);
                gameStatus.textContent = translations[currentLanguage].complete;
                gameStatus.style.color = '#4ade80';
                gameStatus.classList.add('game-won');
                
                // Помечаем все мины флагами
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        const cell = board[i][j];
                        if (cell.isMine && !cell.isFlagged) {
                            cell.isFlagged = true;
                            cell.element.classList.add('flagged');
                        }
                    }
                }
                flaggedCells = totalMines;
                updateMinesCounter();
            }
        }

        // Подсказка
        function giveHint() {
            if (!gameActive || firstClick) return;
            
            // Находим безопасную ячейку для открытия
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = board[i][j];
                    if (!cell.isRevealed && !cell.isFlagged && !cell.isMine && cell.adjacentMines === 0) {
                        revealCell(i, j);
                        return;
                    }
                }
            }
            
            // Если не нашли безопасную ячейку, открываем любую не минную
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = board[i][j];
                    if (!cell.isRevealed && !cell.isFlagged && !cell.isMine) {
                        revealCell(i, j);
                        return;
                    }
                }
            }
        }

        // Обновление отображения жизней
        function updateLivesDisplay() {
            const hearts = livesElement.querySelectorAll('.heart');
            hearts.forEach((heart, index) => {
                if (index < lives) {
                    heart.classList.remove('empty');
                } else {
                    heart.classList.add('empty');
                }
            });
        }

        // Обновление счетчика мин
        function updateMinesCounter() {
            minesCounterElement.textContent = `💣: ${totalMines - flaggedCells}`;
        }

        // Запуск таймера
        function startTimer() {
            gameTime = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameTime++;
                updateTimer();
            }, 1000);
        }

        // Обновление таймера
        function updateTimer() {
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Новая игра
        function startNewGame() {
            const settings = difficultySettings[currentDifficulty];
            rows = settings.rows;
            cols = settings.cols;
            totalMines = settings.mines;
            
            createBoard();
            startTimer();
            
            revealedCells = 0;
            flaggedCells = 0;
            lives = 3;
            gameActive = true;
            firstClick = true;
            
            gameStatus.textContent = '';
            gameStatus.classList.remove('game-over', 'game-won');
            gameStatus.style.color = '#f8fafc';
            
            updateMinesCounter();
            updateLivesDisplay();
        }

        // Установка языка
        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Обновляем активную кнопку языка
            langButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            // Обновляем тексты
            updateUI();
        }

        // Установка сложности
        function setDifficulty(diff) {
            currentDifficulty = diff;
            
            // Обновляем активную кнопку сложности
            diffButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.diff === diff);
            });
            
            // Начинаем новую игру с выбранной сложностью
            startNewGame();
        }

        // Обновление интерфейса
        function updateUI() {
            titleElement.textContent = translations[currentLanguage].title;
            hintBtn.textContent = translations[currentLanguage].hint;
            newGameBtn.textContent = translations[currentLanguage].newGame;
            timerElement.textContent = `00:00`;
            minesCounterElement.textContent = `💣: ${totalMines}`;
            updateMinesCounter();
            updateLivesDisplay();
        }

        // Запуск игры при загрузке страницы
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
